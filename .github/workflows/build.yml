name: Build ERP EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: mapco-erp-execution

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npx vite build

      - name: Disable TS checking
        shell: pwsh
        run: |
          $file = "electron/services/realmService.ts"
          if (Test-Path $file) {
            $content = Get-Content $file -Raw
            if (-not $content.StartsWith("// @ts-nocheck")) {
              Set-Content $file ("// @ts-nocheck`r`n" + $content)
            }
          }

      - name: Build electron files
        run: npx tsc -p tsconfig.electron.json

      - name: Build Windows installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Show build files
        run: dir dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ERP-EXE
          path: |
            mapco-erp-execution/dist/*.exe
            mapco-erp-execution/dist/win-unpacked/**
