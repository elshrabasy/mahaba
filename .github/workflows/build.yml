name: Build ERP EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: mapco-erp-execution

    steps:
      - name: تحميل المشروع
        uses: actions/checkout@v4

      - name: تثبيت Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: تثبيت المكتبات
        run: npm install --legacy-peer-deps

      - name: بناء البرنامج
        run: |
          npm run build
          npx electron-builder --win nsis --x64

      - name: رفع ملف EXE
        uses: actions/upload-artifact@v4
        with:
          name: ERP-EXE
          path: |
            mapco-erp-execution/release/*.exe
            mapco-erp-execution/release/win-unpacked/**
